name: Publish SDK to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'sdk-v')
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify release tag matches SDK package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#sdk-v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::packages/sdk/package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Publish SDK dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public

      - name: Publish SDK to npm with trusted publishing
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: npm publish --access public
